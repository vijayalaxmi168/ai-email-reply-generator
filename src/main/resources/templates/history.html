<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reply History | AI Email Reply Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .navbar { background: rgba(0,0,0,0.2) !important; backdrop-filter: blur(10px); }
        .card-history {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .reply-box {
            background: #f8f9ff;
            border-left: 3px solid #667eea;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 0.9em;
            white-space: pre-wrap;
            max-height: 150px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-envelope-fill me-2"></i> AI Email Reply Generator
        </a>
        <a href="/" class="btn btn-outline-light btn-sm">
            <i class="bi bi-plus-circle me-1"></i> Generate New
        </a>
    </div>
</nav>

<div class="container py-5">
    <div class="card-history p-4">
        <h4 class="fw-bold mb-4" style="color: #667eea;">
            <i class="bi bi-clock-history me-2"></i>Reply History
        </h4>

        <!-- No replies yet -->
        <div th:if="${replies == null or replies.isEmpty()}" class="text-center py-5 text-muted">
            <i class="bi bi-inbox" style="font-size: 3rem;"></i>
            <p class="mt-3">No replies generated yet. <a href="/">Generate your first one!</a></p>
        </div>

        <!-- Replies list -->
        <div th:each="reply : ${replies}" class="border rounded-3 p-3 mb-4">
            <div class="d-flex justify-content-between align-items-start mb-2">
                <div>
                    <span class="badge bg-secondary me-2">#<span th:text="${reply.id}"></span></span>
                    <span th:if="${reply.tone == 'professional'}" class="badge bg-primary">💼 Professional</span>
                    <span th:if="${reply.tone == 'friendly'}" class="badge bg-success">😊 Friendly</span>
                    <span th:if="${reply.tone == 'short'}" class="badge bg-warning text-dark">⚡ Short</span>
                </div>
                <small class="text-muted"
                       th:text="${#temporals.format(reply.createdAt, 'MMM dd, yyyy HH:mm')}"></small>
            </div>
            <div class="row g-3">
                <div class="col-md-6">
                    <p class="text-muted small fw-semibold mb-1">ORIGINAL EMAIL</p>
                    <div class="reply-box" th:text="${reply.emailContent}"></div>
                </div>
                <div class="col-md-6">
                    <p class="text-muted small fw-semibold mb-1">AI GENERATED REPLY</p>
                    <div class="reply-box" th:text="${reply.generatedReply}"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
