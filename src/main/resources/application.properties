# ============================================
# APPLICATION CONFIGURATION
# ============================================
spring.application.name=ai-email-reply-generator
server.port=8080

# ============================================
# MYSQL DATABASE CONFIGURATION
# Change username/password to match your setup
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/email_reply_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=admin1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



# ============================================
# JPA / HIBERNATE CONFIGURATION
# ============================================
# update = Hibernate creates/updates tables automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================
# OPENAI API CONFIGURATION
# Replace with your actual OpenAI API key
# Get one from: https://platform.openai.com/api-keys
# ============================================

openai.api.key=AIzaSyDiWY7bjEW1sNej91-sEOiJtJUUSCv0jRc
openai.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent

openai.model=gemini-3-flash-preview
openai.max-tokens=500


# ============================================
# THYMELEAF CONFIGURATION
# ============================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ============================================
# LOGGING
# ============================================
logging.level.com.aiemailreply=DEBUG
logging.level.org.springframework.web=INFO
